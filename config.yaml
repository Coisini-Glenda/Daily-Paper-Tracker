llm:
  base_url: ***(大模型API的url)
  api_key: ***(对应的API KEY)
  model: ***
output:
  dir: ./daily
arxiv:
  enabled: true
  days_back: 1
  categories:
  - cs.AI
  - cs.CL
  - cs.CV
